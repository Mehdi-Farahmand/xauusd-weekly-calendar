<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAU/USD — تحلیل اخبار اقتصادی | مهدی فرهمند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;900&family=SF+Pro+Display:wght@300;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#070B14;--navy2:#0B1220;--navy3:#101828;
  --g:#C9A84C;--g2:#F5E4A8;--g3:#E8C96A;--g4:#8B6914;
  --glass:rgba(255,255,255,0.08);
  --glass2:rgba(255,255,255,0.13);
  --glass3:rgba(255,255,255,0.18);
  --glassdark:rgba(8,12,24,0.55);
  --gb:rgba(201,168,76,0.10);
  --gb2:rgba(201,168,76,0.18);
  --gb3:rgba(201,168,76,0.28);
  --border:rgba(255,255,255,0.13);
  --border2:rgba(201,168,76,0.38);
  --bull:#1DB87A;--bear:#E05252;--neu:#8A9BB8;--warn:#E09340;
  --text:#EEF2FF;--text2:#9BAAC8;--text3:#4A6080;
  --r20:20px;--r16:16px;--r12:12px;--r8:8px;
  --blur:blur(28px) saturate(200%);
  --blur2:blur(16px) saturate(160%);
  --shadow:0 8px 32px rgba(0,0,0,0.45);
  --shadow2:0 24px 80px rgba(0,0,0,0.65);
}
html{scroll-behavior:smooth}
body{
  background:var(--navy);
  color:var(--text);
  font-family:'Vazirmatn',Tahoma,sans-serif;
  overflow-x:hidden;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── CANVAS ── */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7}

/* ── BG ORBS ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px)}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,.07),transparent 70%);top:-200px;right:-200px;animation:orbFloat 20s ease-in-out infinite}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(17,34,80,.8),transparent 70%);bottom:-150px;left:-150px;animation:orbFloat 26s ease-in-out 4s infinite reverse}
.orb3{width:400px;height:400px;background:radial-gradient(circle,rgba(201,168,76,.04),transparent 70%);top:45%;left:25%;animation:orbFloat 32s ease-in-out 8s infinite}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(30px,-50px) scale(1.06)}70%{transform:translate(-20px,25px) scale(.95)}}

/* ══════════════════════════════════
   NAVBAR — Glass iOS
══════════════════════════════════ */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(8,12,24,0.45);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:all .4s
}
.navbar.scrolled{
  background:rgba(8,12,24,0.72);
  box-shadow:0 1px 0 rgba(201,168,76,.15),0 8px 32px rgba(0,0,0,.4)
}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-pulse-wrap{position:relative;width:8px;height:8px}
.nav-pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--g)}
.nav-pulse-ring{position:absolute;inset:-5px;border-radius:50%;border:1.5px solid rgba(201,168,76,.5);animation:ringPulse 2s ease-in-out infinite;opacity:0}
@keyframes ringPulse{0%{transform:scale(.5);opacity:.9}100%{transform:scale(2);opacity:0}}
.nav-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.2px}
.nav-sub{font-size:9px;color:var(--text3);letter-spacing:1.5px;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-chip{
  font-size:10px;padding:4px 12px;border-radius:20px;
  background:var(--gb);color:var(--g3);
  border:1px solid var(--border2);
  backdrop-filter:blur(12px);
  display:none
}
@media(min-width:440px){.nav-chip{display:inline-flex}}
.nav-ig{
  font-size:10px;padding:7px 14px;border-radius:20px;font-weight:600;
  text-decoration:none;
  background:rgba(201,168,76,.12);
  color:var(--g3);border:1px solid rgba(201,168,76,.3);
  backdrop-filter:blur(12px);
  transition:all .3s;white-space:nowrap;letter-spacing:.2px
}
.nav-ig:hover{background:rgba(201,168,76,.22);box-shadow:0 0 20px rgba(201,168,76,.2);transform:translateY(-1px)}

/* ══════════════════════════════════
   HERO
══════════════════════════════════ */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:100px 24px 80px;
  position:relative;z-index:1;overflow:hidden
}

/* badge */
.hero-badge{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(201,168,76,.22);
  border-radius:100px;
  padding:10px 22px;
  font-size:12px;color:var(--g3);letter-spacing:1.5px;
  margin-bottom:52px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 4px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.1);
  animation:fadeUp .8s ease both;
  white-space:nowrap
}

/* HERO TITLE — فاصله عمودی درست */
.hero-title-block{
  display:flex;flex-direction:column;
  align-items:center;
  gap:14px;          /* فاصله عمودی بین خطوط */
  margin-bottom:28px;
  animation:fadeUp .9s ease .1s both
}
.hero-line1{
  display:flex;align-items:center;justify-content:center;
  gap:12px;flex-wrap:wrap
}
.hero-line2{
  display:flex;align-items:center;justify-content:center;
  gap:12px;flex-wrap:wrap
}
.hero-word{
  font-size:clamp(38px,8.5vw,96px);
  font-weight:900;line-height:1;letter-spacing:-2px;
  color:var(--text);display:inline-block
}
.hero-word.g{
  background:linear-gradient(135deg,#5A3E0A 0%,#C9A84C 30%,#F5E4A8 55%,#E8C96A 75%,#8B6914 100%);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 36px rgba(201,168,76,.35));
  animation:shimmer 4s ease-in-out infinite
}
@keyframes shimmer{0%,100%{filter:drop-shadow(0 0 28px rgba(201,168,76,.3))}50%{filter:drop-shadow(0 0 56px rgba(201,168,76,.6)) drop-shadow(0 0 90px rgba(201,168,76,.15))}}

.hero-en{
  font-size:clamp(9px,1.3vw,12px);
  font-weight:300;color:var(--text3);
  letter-spacing:8px;text-transform:uppercase;
  margin-bottom:6px;
  animation:fadeUp .9s ease .2s both
}
.hero-divider{
  width:1px;height:56px;
  background:linear-gradient(180deg,transparent,rgba(201,168,76,.55),transparent);
  margin:24px auto;
  animation:fadeIn 1s ease .4s both
}
.hero-desc{
  font-size:clamp(13px,2vw,15px);
  color:var(--text2);line-height:2.2;max-width:440px;
  animation:fadeUp 1s ease .3s both;margin-bottom:44px
}
.hero-cta{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  animation:fadeUp 1s ease .5s both
}

/* CTA Buttons — iOS Glass */
.btn-glass{
  padding:14px 28px;border-radius:16px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Vazirmatn',sans-serif;
  background:rgba(201,168,76,.15);
  color:var(--g2);border:1px solid rgba(201,168,76,.38);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  transition:all .3s;letter-spacing:.2px;
  box-shadow:0 4px 24px rgba(201,168,76,.12),inset 0 1px 0 rgba(255,255,255,.12);
  position:relative;overflow:hidden
}
.btn-glass::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  opacity:0;transition:opacity .3s
}
.btn-glass:hover::before{opacity:1}
.btn-glass:hover{
  transform:translateY(-3px);
  background:rgba(201,168,76,.25);
  box-shadow:0 12px 40px rgba(201,168,76,.25),0 0 0 1px rgba(201,168,76,.5),inset 0 1px 0 rgba(255,255,255,.18)
}
.btn-glass-sec{
  padding:14px 28px;border-radius:16px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:'Vazirmatn',sans-serif;
  background:rgba(255,255,255,.06);color:var(--text2);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  transition:all .3s;
  box-shadow:0 4px 24px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08)
}
.btn-glass-sec:hover{
  background:rgba(255,255,255,.12);border-color:rgba(201,168,76,.28);color:var(--text);
  transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.12)
}

.scroll-hint{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;animation:fadeIn 2s ease 1.8s both;opacity:.35;transition:opacity .3s
}
.scroll-hint:hover{opacity:.85}
.scroll-hint span{font-size:8px;color:var(--text3);letter-spacing:4px;text-transform:uppercase}
.scroll-line{width:1px;height:44px;background:linear-gradient(180deg,var(--g),transparent);animation:scrollAnim 2.5s ease-in-out infinite}
@keyframes scrollAnim{0%,100%{height:20px;opacity:.2}60%{height:48px;opacity:.8}}

/* ══════════════════════════════════
   CLOCKS — Glass pill
══════════════════════════════════ */
.clocks-bar{
  position:relative;z-index:1;
  display:flex;justify-content:center;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);
  border-top:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.06)
}
.clock-item{
  text-align:center;padding:18px 40px;
  border-right:1px solid rgba(255,255,255,.05)
}
.clock-item:last-child{border-right:none}
.clock-city{font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.clock-time{font-family:'SF Mono',Courier,monospace;font-size:17px;font-weight:700;color:var(--g3);letter-spacing:2px;text-shadow:0 0 18px rgba(201,168,76,.35)}

.gold-line{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent);position:relative;z-index:1}

/* ══════════════════════════════════
   SECTIONS
══════════════════════════════════ */
section{position:relative;z-index:1;padding:72px 20px}
.container{max-width:960px;margin:0 auto}
.sec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g3);margin-bottom:12px;font-weight:700}
.sec-title{font-size:clamp(24px,3.8vw,38px);font-weight:900;line-height:1.15;color:var(--text);margin-bottom:10px}
.sec-sub{font-size:13px;color:var(--text2);line-height:1.9;max-width:500px}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.reveal.in{opacity:1;transform:none}

/* ══════════════════════════════════
   WEEK TABS — iOS Pill
══════════════════════════════════ */
.week-tabs{
  display:flex;gap:8px;overflow-x:auto;
  padding:4px 2px 12px;
  scrollbar-width:none;margin-bottom:20px
}
.week-tabs::-webkit-scrollbar{display:none}
.wtab{
  flex-shrink:0;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:14px 18px 12px;
  text-align:center;cursor:pointer;
  transition:all .3s;min-width:100px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08)
}
.wtab.active{
  background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.06));
  border-color:rgba(201,168,76,.48);
  box-shadow:0 0 32px rgba(201,168,76,.12),0 0 0 1px rgba(201,168,76,.28),inset 0 1px 0 rgba(255,255,255,.12)
}
.wtab.active .wtab-name{color:var(--g3)}
.wtab:hover:not(.active){border-color:rgba(201,168,76,.22);transform:translateY(-2px)}
.wtab-greg{font-size:8px;color:var(--text3);letter-spacing:1.5px;margin-bottom:5px;text-transform:uppercase}
.wtab-name{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;transition:color .3s}
.wtab-shamsi{font-size:9px;color:var(--text3);margin-bottom:10px}
.wtab-dots{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.wtab-dot{width:5px;height:5px;border-radius:50%}
.wtab-dot.h{background:var(--bear);box-shadow:0 0 5px rgba(224,82,82,.5)}
.wtab-dot.m{background:var(--warn)}
.wtab-dot.l{background:var(--text3);opacity:.3}

/* ══════════════════════════════════
   DAY PANEL — Big Glass Card
══════════════════════════════════ */
.day-panel{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;overflow:hidden;
  box-shadow:var(--shadow2),inset 0 1px 0 rgba(255,255,255,.10);
  backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);
  transition:opacity .45s ease,transform .45s ease
}
.dph{
  padding:24px 24px 20px;
  background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(255,255,255,.03));
  border-bottom:1px solid rgba(255,255,255,.07)
}
.dph-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:14px}
.dph-day{font-size:20px;font-weight:900;color:var(--text);margin-bottom:4px}
.dph-dates{font-size:10px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap}
.badge{font-size:10px;padding:5px 14px;border-radius:20px;font-weight:700;letter-spacing:.4px;backdrop-filter:blur(12px)}
.badge.bull{background:rgba(29,184,122,.12);color:#1DB87A;border:1px solid rgba(29,184,122,.22)}
.badge.bear{background:rgba(224,82,82,.12);color:#E05252;border:1px solid rgba(224,82,82,.22)}
.badge.neu{background:rgba(138,155,184,.1);color:var(--neu);border:1px solid rgba(138,155,184,.18)}
.prob-pills{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.pp{font-size:10px;padding:4px 11px;border-radius:20px;font-weight:700;border:1px solid;backdrop-filter:blur(8px)}
.pp.bull{background:rgba(29,184,122,.08);color:#1DB87A;border-color:rgba(29,184,122,.2)}
.pp.neu{background:rgba(138,155,184,.08);color:var(--neu);border-color:rgba(138,155,184,.18)}
.pp.bear{background:rgba(224,82,82,.08);color:#E05252;border-color:rgba(224,82,82,.2)}
.dph-narrative{font-size:12px;color:var(--text2);line-height:2;margin-top:10px}

/* ══════════════════════════════════
   EVENTS — Mobile Swipe Cards
══════════════════════════════════ */
.events-scroll{
  padding:20px 20px 4px;
  display:flex;flex-direction:column;gap:10px
}
.ev-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px;padding:16px 18px;
  transition:all .25s;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 2px 16px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.07);
  animation:cardIn .4s ease both;
  cursor:pointer;
  /* Swipe/collapsible */
  overflow:hidden
}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.ev-card:hover{
  border-color:rgba(201,168,76,.22);
  transform:translateX(-3px);
  box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1)
}
.ev-card.critical{
  border-color:rgba(224,82,82,.3);
  background:rgba(224,82,82,.04)
}
.ev-header{display:flex;align-items:center;gap:10px}
.ev-imp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ev-imp-dot.h{background:var(--bear);box-shadow:0 0 8px rgba(224,82,82,.5)}
.ev-imp-dot.m{background:var(--warn);box-shadow:0 0 6px rgba(224,147,64,.4)}
.ev-imp-dot.l{background:var(--text3)}
.ev-name-block{flex:1;min-width:0}
.ev-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;word-break:keep-all}
.ev-name-sub{font-size:10px;color:var(--text3);margin-top:2px}
.ev-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.ev-time-badge{
  font-family:'SF Mono',Courier,monospace;
  font-size:11px;font-weight:700;color:var(--g3);
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);
  padding:3px 8px;border-radius:8px;
  text-shadow:0 0 10px rgba(201,168,76,.3)
}
.cur-tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;letter-spacing:.5px}
.cur-usd{background:rgba(29,184,122,.1);color:#1DB87A;border:1px solid rgba(29,184,122,.18)}
.cur-jpy{background:rgba(91,159,224,.1);color:#5B9FE0;border:1px solid rgba(91,159,224,.18)}
.imp-tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px}
.imp-h{background:rgba(224,82,82,.1);color:#E05252;border:1px solid rgba(224,82,82,.18)}
.imp-m{background:rgba(224,147,64,.1);color:var(--warn);border:1px solid rgba(224,147,64,.18)}
.imp-l{background:rgba(138,155,184,.08);color:var(--neu);border:1px solid rgba(138,155,184,.15)}

/* Expandable detail */
.ev-detail{
  max-height:0;overflow:hidden;
  transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;
  opacity:0
}
.ev-detail.open{max-height:200px;opacity:1}
.ev-detail-inner{
  margin-top:14px;padding-top:14px;
  border-top:1px solid rgba(255,255,255,.06);
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px
}
.ev-stat{text-align:center}
.ev-stat-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.ev-stat-val{font-family:'SF Mono',Courier,monospace;font-size:13px;font-weight:700;color:var(--text2)}
.ev-xau-row{margin-top:12px;display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.04)}
.ev-xau-label{font-size:10px;color:var(--text3)}
.xau-up{color:var(--bull);font-weight:700;font-size:12px}
.xau-dn{color:var(--bear);font-weight:700;font-size:12px}
.xau-ne{color:var(--neu);font-weight:600;font-size:12px}

/* ══════════════════════════════════
   SUMMARY BOTTOM
══════════════════════════════════ */
.sum-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  padding:20px;border-top:1px solid rgba(255,255,255,.05)
}
@media(max-width:540px){.sum-grid{grid-template-columns:1fr}}
.sum-card{
  background:rgba(255,255,255,.04);border-radius:20px;padding:18px;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07)
}
.sum-label{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.chain-list{display:flex;flex-direction:column;gap:0}
.chain-item{display:flex;gap:12px;align-items:flex-start}
.chain-dot-col{display:flex;flex-direction:column;align-items:center}
.chain-dot{width:8px;height:8px;border-radius:50%;background:var(--g);box-shadow:0 0 8px rgba(201,168,76,.5);margin-top:4px;flex-shrink:0}
.chain-vline{width:1px;height:18px;background:linear-gradient(180deg,rgba(201,168,76,.45),transparent)}
.chain-step{font-size:9px;font-weight:700;color:var(--g3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.chain-val{font-size:11px;color:var(--text2);line-height:1.7;padding-bottom:12px}

.prob-bar{
  display:flex;height:28px;border-radius:12px;overflow:hidden;
  background:rgba(255,255,255,.04);margin-top:10px;
  box-shadow:inset 0 1px 0 rgba(0,0,0,.2)
}
